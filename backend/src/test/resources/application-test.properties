# H2 in-memory for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MSSQLServer;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT (same as dev for predictability)
jwt.secret=FinancialManagementSecretKey2024VeryLongStringMinimum256Bits
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Disable mail in tests
spring.mail.host=localhost
spring.mail.port=3025

otp.expiration-minutes=5
otp.resend-cooldown-seconds=60
